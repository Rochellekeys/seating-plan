<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlightStory Seating Planner</title>
<style>
  :root {
    --bg: #0f0f11;
    --surface: #18181c;
    --surface2: #222228;
    --border: #2e2e38;
    --accent: #e2fd47;
    --accent2: #fa6d8a;
    --text: #e8e8f0;
    --text2: #888899;
    --desk-bg: #1e2235;
    --desk-border: #3a3f6e;
    --chair-fill: #2a3a2a;
    --chair-border: #4a7a4a;
    --chair-occupied: #2a3550;
    --chair-occupied-border: #5a7aaa;
    --green: #5abf7a;
    --yellow: #f0c040;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 10px 18px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    flex-wrap: wrap;
  }

  .logo {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text);
    white-space: nowrap;
  }
  .logo span { color: var(--accent); }

  .toolbar {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    flex: 1;
  }

  .btn {
    font-family: Arial, sans-serif;
    font-size: 11px;
    font-weight: 500;
    padding: 6px 12px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 5px;
    user-select: none;
  }
  .btn:hover { background: var(--border); border-color: var(--accent); color: var(--accent); }
  .btn.active { background: var(--accent); border-color: var(--accent); color: #111; }
  .btn.danger:hover { border-color: var(--accent2); color: var(--accent2); }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; }

  .divider { width: 1px; background: var(--border); height: 28px; margin: 0 4px; }

  /* MAIN LAYOUT */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* SIDEBAR */
  .sidebar {
    width: 210px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
  }

  .sidebar-section {
    padding: 12px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: var(--text2);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .staff-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .staff-list::-webkit-scrollbar { width: 4px; }
  .staff-list::-webkit-scrollbar-track { background: transparent; }
  .staff-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .staff-card {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 9px;
    border-radius: 7px;
    border: 1px solid transparent;
    cursor: grab;
    transition: all 0.15s;
    margin-bottom: 4px;
    background: var(--surface2);
  }
  .staff-card:hover { border-color: var(--accent); }
  .staff-card.dragging { opacity: 0.4; }
  .staff-card.seated { opacity: 0.5; }

  .staff-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    flex-shrink: 0;
    color: #fff;
  }

  .staff-info { flex: 1; min-width: 0; }
  .staff-name {
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .staff-role {
    font-size: 10px;
    color: var(--text2);
    font-family: Arial, sans-serif;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .staff-seat-badge {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    flex-shrink: 0;
  }
  .staff-seat-badge.unseat { background: var(--text2); }

  /* ADD STAFF FORM */
  .add-form { display: flex; flex-direction: column; gap: 6px; }
  .input {
    font-family: Arial, sans-serif;
    font-size: 11px;
    padding: 6px 9px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }
  .input:focus { border-color: var(--accent); }
  .input::placeholder { color: var(--text2); }

  /* CANVAS AREA */
  .canvas-wrap {
    flex: 1;
    overflow: hidden;
    position: relative;
    background:
      radial-gradient(circle at 20% 30%, rgba(124,109,250,0.06) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(250,109,138,0.04) 0%, transparent 50%),
      var(--bg);
  }

  /* Dot grid */
  .canvas-wrap::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.06) 1px, transparent 1px);
    background-size: 24px 24px;
    pointer-events: none;
    z-index: 0;
  }

  #canvas {
    position: absolute;
    top: 0; left: 0;
    transform-origin: 0 0;
    cursor: default;
  }

  /* DESK */
  .desk {
    position: absolute;
    background: var(--desk-bg);
    border: 1.5px solid var(--desk-border);
    border-radius: 8px;
    user-select: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .desk:hover { border-color: var(--accent); }
  .desk.selected { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(226,253,71,0.25); }
  .desk.drag-over { border-color: var(--green); box-shadow: 0 0 0 2px rgba(90,191,122,0.25); }

  .desk-label {
    position: absolute;
    top: 50%; left: 6px; right: 26px;
    transform: translateY(-50%);
    font-size: 12px;
    font-weight: 700;
    font-family: Arial, sans-serif;
    color: var(--text);
    letter-spacing: 0.3px;
    cursor: text;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    text-align: center;
  }
  .desk-label:hover { color: #fff; }

  .desk-label-input {
    position: absolute;
    top: 50%; left: 5px; right: 26px;
    transform: translateY(-50%);
    font-size: 12px;
    font-weight: 700;
    font-family: Arial, sans-serif;
    background: var(--surface2);
    border: 1px solid var(--accent);
    border-radius: 3px;
    color: var(--text);
    outline: none;
    padding: 1px 4px;
    text-align: center;
    z-index: 20;
  }

  .desk-handle {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    cursor: move;
    border-radius: 8px;
  }

  .desk-delete {
    position: absolute;
    top: -8px; right: -8px;
    width: 18px; height: 18px;
    background: var(--accent2);
    border: none;
    border-radius: 50%;
    color: #fff;
    font-size: 12px;
    line-height: 1;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 10;
    font-weight: 700;
  }
  .desk.selected .desk-delete { display: flex; }
  .desk-delete:hover { transform: scale(1.2); }

  /* CHAIR */
  .chair {
    position: absolute;
    width: 77px; height: 77px;
    background: var(--chair-fill);
    border: 1.5px solid var(--chair-border);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.15s;
    flex-direction: column;
    overflow: hidden;
  }
  .chair:hover { transform: scale(1.08); }
  .chair.occupied {
    background: var(--chair-occupied);
    border-color: var(--chair-occupied-border);
  }
  .chair.drag-target {
    border-color: var(--green);
    box-shadow: 0 0 0 3px rgba(90,191,122,0.3);
    transform: scale(1.08);
  }

  .chair-avatar {
    width: 45px; height: 45px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    color: #fff;
    pointer-events: none;
    flex-shrink: 0;
  }

  .chair-icon {
    font-size: 32px;
    color: var(--chair-border);
    pointer-events: none;
  }

  .chair-name {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    text-align: center;
    max-width: 120px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    pointer-events: none;
    line-height: 1.2;
    margin-top: 2px;
  }

  .chair-delete {
    position: absolute;
    top: -6px; right: -6px;
    width: 14px; height: 14px;
    background: var(--accent2);
    border: none;
    border-radius: 50%;
    color: #fff;
    font-size: 10px;
    line-height: 1;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }
  .desk.selected .chair-delete { display: flex; }

  /* ZOOM CONTROLS */
  .zoom-controls {
    position: absolute;
    bottom: 16px;
    right: 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    z-index: 20;
  }
  .zoom-btn {
    width: 32px; height: 32px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .zoom-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* STATUS BAR */
  .statusbar {
    display: flex;
    gap: 16px;
    padding: 5px 14px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    font-family: Arial, sans-serif;
    font-size: 10px;
    color: var(--text2);
    flex-shrink: 0;
  }
  .statusbar span { color: var(--text); }

  /* TOOLTIP */
  .tooltip {
    position: fixed;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 11px;
    pointer-events: none;
    z-index: 100;
    display: none;
    font-family: Arial, sans-serif;
    color: var(--text);
  }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    width: 280px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .modal h3 { font-size: 16px; font-weight: 700; }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }

  /* Context menu */
  .ctx-menu {
    position: fixed;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px;
    z-index: 300;
    display: none;
    min-width: 200px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .ctx-menu.open { display: block; }
  .ctx-person-info {
    padding: 8px 12px 6px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 3px;
  }
  .ctx-person-name {
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 2px;
  }
  .ctx-person-detail {
    font-size: 11px;
    color: var(--text2);
    line-height: 1.5;
  }
  .ctx-item {
    font-size: 12px;
    padding: 7px 12px;
    border-radius: 5px;
    cursor: pointer;
    font-family: Arial, sans-serif;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .ctx-item:hover { background: var(--border); }
  .ctx-item.danger { color: var(--accent2); }
  .ctx-sep { height: 1px; background: var(--border); margin: 3px 0; }

  /* Team colour dot in dropdown */
  .team-option-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
  }

  /* Team list in sidebar */
  .team-row {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 3px 0;
    font-size: 11px;
    color: var(--text);
  }
  .team-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .team-name { flex: 1; font-size: 11px; }
  .team-delete {
    background: none;
    border: none;
    color: var(--text2);
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    padding: 0 2px;
    border-radius: 3px;
  }
  .team-delete:hover { color: var(--accent2); }

  /* NOTES */
  .notes-area {
    width: 100%;
    min-height: 80px;
    resize: vertical;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: Arial, sans-serif;
    font-size: 11px;
    line-height: 1.5;
    padding: 8px;
    outline: none;
    transition: border-color 0.15s;
  }
  .notes-area:focus { border-color: var(--accent); }
  .notes-area::placeholder { color: var(--text2); }

  /* Font size drag handle on desk */
  .desk-font-handle {
    position: absolute;
    bottom: 3px;
    left: 50%;
    transform: translateX(-50%);
    width: 28px;
    height: 8px;
    background: rgba(226,253,71,0.25);
    border-radius: 4px;
    cursor: ns-resize;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 12;
  }
  .desk-font-handle::after {
    content: '⠿';
    font-size: 8px;
    color: var(--accent);
    line-height: 1;
  }
  .desk.selected .desk-font-handle { display: flex; }
  .desk-font-handle:hover { background: rgba(226,253,71,0.45); }
  .notes-saved {
    font-size: 10px;
    color: var(--green);
    margin-top: 4px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .notes-saved.show { opacity: 1; }

  /* ── STAFF SEARCH & GROUPS ── */
  .staff-search-wrap {
    padding: 6px 8px 4px;
    position: relative;
  }
  .staff-search {
    width: 100%;
    font-family: Arial, sans-serif;
    font-size: 11px;
    padding: 6px 28px 6px 9px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  .staff-search:focus { border-color: var(--accent); }
  .staff-search::placeholder { color: var(--text2); }
  .staff-search-clear {
    position: absolute;
    right: 16px; top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--text2);
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    display: none;
  }
  .staff-search-clear.visible { display: block; }

  .team-group { margin-bottom: 4px; }
  .team-group-header {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 8px;
    cursor: pointer;
    border-radius: 5px;
    user-select: none;
    transition: background 0.12s;
    position: sticky;
    top: 0;
    background: var(--surface);
    z-index: 2;
  }
  .team-group-header:hover { background: var(--surface2); }
  .team-group-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .team-group-name {
    flex: 1;
    font-size: 11px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .team-group-count {
    font-size: 10px;
    color: var(--text2);
    background: var(--surface2);
    border-radius: 8px;
    padding: 1px 6px;
  }
  .team-group-chevron {
    font-size: 10px;
    color: var(--text2);
    transition: transform 0.2s;
  }
  .team-group.collapsed .team-group-chevron { transform: rotate(-90deg); }
  .team-group-members { overflow: hidden; }
  .team-group.collapsed .team-group-members { display: none; }

  /* ── CANVAS STICKY NOTES ── */
  .sticky {
    position: absolute;
    min-width: 120px;
    min-height: 60px;
    background: #2a2a18;
    border: 1.5px solid var(--accent);
    border-radius: 6px;
    padding: 8px 28px 8px 8px;
    cursor: move;
    user-select: none;
    z-index: 50;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    transition: border-color 0.15s, box-shadow 0.15s;
    resize: both;
    overflow: hidden;
  }
  .sticky:hover { border-color: var(--accent); box-shadow: 0 6px 20px rgba(0,0,0,0.5); }
  .sticky.selected { box-shadow: 0 0 0 2px rgba(226,253,71,0.35), 0 6px 20px rgba(0,0,0,0.5); }

  .sticky-text {
    font-size: 13px;
    color: var(--text);
    font-family: Arial, sans-serif;
    line-height: 1.5;
    width: 100%;
    min-height: 40px;
    background: none;
    border: none;
    outline: none;
    resize: none;
    cursor: text;
    white-space: pre-wrap;
    word-wrap: break-word;
    pointer-events: none;
  }
  .sticky.editing .sticky-text {
    pointer-events: auto;
    cursor: text;
  }
  .sticky-delete {
    position: absolute;
    top: 4px; right: 4px;
    width: 18px; height: 18px;
    background: var(--accent2);
    border: none;
    border-radius: 50%;
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 5;
  }
  .sticky:hover .sticky-delete,
  .sticky.selected .sticky-delete { opacity: 1; }
  .sticky-delete:hover { transform: scale(1.2); }

  /* ── FLOOR TABS ── */
  .floor-tabs {
    display: flex;
    align-items: center;
    gap: 2px;
    padding: 0 12px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    overflow-x: auto;
  }
  .floor-tab {
    font-family: Arial, sans-serif;
    font-size: 12px;
    font-weight: 600;
    padding: 8px 14px;
    border: none;
    border-bottom: 3px solid transparent;
    background: none;
    color: var(--text2);
    cursor: pointer;
    white-space: nowrap;
    transition: color 0.15s, border-color 0.15s;
    margin-bottom: -1px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .floor-tab:hover { color: var(--text); }
  .floor-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .floor-tab-del {
    font-size: 13px;
    color: var(--text2);
    line-height: 1;
    opacity: 0;
    transition: opacity 0.15s;
    cursor: pointer;
    border-radius: 50%;
    width: 14px; height: 14px;
    display: flex; align-items: center; justify-content: center;
  }
  .floor-tab:hover .floor-tab-del,
  .floor-tab.active .floor-tab-del { opacity: 1; }
  .floor-tab-del:hover { color: var(--accent2); }
  .floor-tab-input {
    font-family: Arial, sans-serif;
    font-size: 12px;
    font-weight: 600;
    background: var(--surface2);
    border: 1px solid var(--accent);
    border-radius: 4px;
    color: var(--text);
    outline: none;
    padding: 2px 6px;
    width: 100px;
  }
  .floor-tab-add {
    font-family: Arial, sans-serif;
    font-size: 18px;
    font-weight: 400;
    padding: 4px 10px;
    border: none;
    background: none;
    color: var(--text2);
    cursor: pointer;
    border-radius: 4px;
    transition: color 0.15s;
    margin-bottom: -1px;
    flex-shrink: 0;
  }
  .floor-tab-add:hover { color: var(--accent); }</style>
</head>
<body>

<header>
  <div class="logo">Flight<span>Story</span></div>
  <div class="toolbar">
    <button class="btn" id="btn-undo" title="Undo (Ctrl+Z)" disabled>↩ Undo</button>
    <button class="btn" id="btn-redo" title="Redo (Ctrl+Y)" disabled>↪ Redo</button>
    <div class="divider"></div>
    <button class="btn" id="btn-add-desk">＋ Add Bank</button>
    <div class="divider"></div>
    <button class="btn" id="btn-add-chair-top" title="Add chair on top of selected bank">↑ Chair Top</button>
    <button class="btn" id="btn-add-chair-bottom" title="Add chair on bottom of selected bank">↓ Chair Bottom</button>
    <button class="btn" id="btn-add-chair-left" title="Add chair on left of selected bank">← Chair Left</button>
    <button class="btn" id="btn-add-chair-right" title="Add chair on right of selected bank">→ Chair Right</button>

<script>
// ─── STATE ───────────────────────────────────────────────────────────────────
// floors is an array of {id, label} — dynamic, user-managed
let floors = [
  { id: 'ground', label: '🏢 Ground' },
  { id: '1st',    label: '1st Floor' },
  { id: '2nd',    label: '2nd Floor' },
  { id: '3rd',    label: '3rd Floor' },
];
let currentFloor = 'ground';
let floorCounter = 10; // start high to avoid clashes with default ids

// Per-floor data
const floorData = {};
floors.forEach(f => {
  floorData[f.id] = { desks: [], notes: [], zoom: 1, panX: 0, panY: 0, deskCounter: 0, noteCounter: 0 };
});

let desks = [];
let staff = [];
let teams = {}; // { teamName: color }
let selectedDeskId = null;
let zoom = 1;
let panX = 0, panY = 0;
let isPanning = false;
let panStart = {x:0, y:0};
let deskCounter = 0;
let chairCounter = 0;
let staffCounter = 0;
let dragStaffId = null;
let isDraggingDesk = false;
let ctxTarget = null;

const TEAM_COLORS = ['#e2fd47','#fa6d8a','#6daaff','#f0c040','#5abf7a','#fa9a6d','#c06dfa','#6dfae0','#ff8fab','#06d6a0'];

// ─── UNDO / REDO ─────────────────────────────────────────────────────────────
const undoStack = [];
const redoStack = [];
const MAX_HISTORY = 50;

function snapshot() {
  saveCurrentFloorData();
  const state = JSON.stringify({
    desks: desks.map(d => ({ ...d, chairs: d.chairs.map(c => ({ ...c })) })),
    staff: staff.map(s => ({ ...s })),
    teams: { ...teams },
    notes: notes.map(n => ({ ...n })),
    floor: currentFloor
  });
  if (undoStack.length && undoStack[undoStack.length - 1] === state) return;
  undoStack.push(state);
  if (undoStack.length > MAX_HISTORY) undoStack.shift();
  redoStack.length = 0;
  updateUndoButtons();
}

function restoreState(state) {
  const s = JSON.parse(state);
  desks = s.desks;
  staff = s.staff;
  teams = s.teams;
  notes = s.notes;
  deskCounter = desks.reduce((m, d) => Math.max(m, parseInt(d.id.slice(1)) || 0), 0);
  staffCounter = staff.reduce((m, s) => Math.max(m, parseInt(s.id.slice(1)) || 0), 0);
  noteCounter = notes.reduce((m, n) => Math.max(m, parseInt(n.id.slice(1)) || 0), 0);
  canvas.innerHTML = '';
  desks.forEach(d => renderDesk(d));
  notes.forEach(n => renderNote(n));
  renderTeamDropdown();
  renderStaffList();
  updateStats();
}

function undo() {
  if (undoStack.length < 2) return;
  const current = undoStack.pop();
  redoStack.push(current);
  restoreState(undoStack[undoStack.length - 1]);
  updateUndoButtons();
  scheduleAutoSave();
}

function redo() {
  if (!redoStack.length) return;
  const next = redoStack.pop();
  undoStack.push(next);
  restoreState(next);
  updateUndoButtons();
  scheduleAutoSave();
}

function updateUndoButtons() {
  const undoBtn = document.getElementById('btn-undo');
  const redoBtn = document.getElementById('btn-redo');
  if (undoBtn) undoBtn.disabled = undoStack.length < 2;
  if (redoBtn) redoBtn.disabled = redoStack.length === 0;
}

// ─── FLOORS ──────────────────────────────────────────────────────────────────
function saveCurrentFloorData() {
  floorData[currentFloor].desks = desks.map(d => ({ ...d, chairs: d.chairs.map(c => ({ ...c })) }));
  floorData[currentFloor].notes = notes.map(n => ({ ...n }));
  floorData[currentFloor].zoom = zoom;
  floorData[currentFloor].panX = panX;
  floorData[currentFloor].panY = panY;
  floorData[currentFloor].deskCounter = deskCounter;
  floorData[currentFloor].noteCounter = noteCounter;
}

function loadFloorData(floor) {
  const fd = floorData[floor];
  desks = fd.desks.map(d => ({ ...d, chairs: d.chairs.map(c => ({ ...c })) }));
  notes = fd.notes.map(n => ({ ...n }));
  zoom = fd.zoom;
  panX = fd.panX;
  panY = fd.panY;
  deskCounter = fd.deskCounter;
  noteCounter = fd.noteCounter;
  selectedDeskId = null;
  selectedNoteId = null;
  canvas.innerHTML = '';
  desks.forEach(d => renderDesk(d));
  notes.forEach(n => renderNote(n));
  updateTransform();
  updateStats();
}

function switchFloor(floorId) {
  if (floorId === currentFloor) return;
  saveCurrentFloorData();
  currentFloor = floorId;
  loadFloorData(floorId);
  renderFloorTabs();
  const fl = floors.find(f => f.id === floorId);
  document.getElementById('stat-hint').textContent =
    `Floor: ${fl ? fl.label : floorId} · Click canvas to deselect · Drag banks to move`;
}

function renderFloorTabs() {
  const tabBar = document.getElementById('floor-tabs');
  // remove existing tabs but keep the + button
  tabBar.querySelectorAll('.floor-tab').forEach(el => el.remove());
  const addBtn = document.getElementById('btn-add-floor');

  floors.forEach(fl => {
    const tab = document.createElement('button');
    tab.className = 'floor-tab' + (fl.id === currentFloor ? ' active' : '');
    tab.dataset.floor = fl.id;
    tab.innerHTML = `<span class="floor-tab-label">${fl.label}</span><span class="floor-tab-del" title="Delete floor">×</span>`;
    // switch floor on click
    tab.querySelector('.floor-tab-label').addEventListener('click', () => switchFloor(fl.id));
    // double-click label to rename
    tab.querySelector('.floor-tab-label').addEventListener('dblclick', e => {
      e.stopPropagation();
      const inp = document.createElement('input');
      inp.className = 'floor-tab-input';
      inp.value = fl.label;
      tab.replaceChild(inp, tab.querySelector('.floor-tab-label'));
      inp.focus(); inp.select();
      const finish = () => {
        const val = inp.value.trim();
        if (val) fl.label = val;
        renderFloorTabs();
        scheduleAutoSave();
      };
      inp.addEventListener('blur', finish);
      inp.addEventListener('keydown', ev => {
        if (ev.key === 'Enter') inp.blur();
        if (ev.key === 'Escape') { inp.value = fl.label; inp.blur(); }
        ev.stopPropagation();
      });
      inp.addEventListener('mousedown', ev => ev.stopPropagation());
    });
    // delete floor
    tab.querySelector('.floor-tab-del').addEventListener('click', e => {
      e.stopPropagation();
      if (floors.length <= 1) { alert('You must have at least one floor.'); return; }
      const hasContent = floorData[fl.id]?.desks?.length > 0 || floorData[fl.id]?.notes?.length > 0;
      const msg = hasContent
        ? `Delete "${fl.label}"? All banks and notes on this floor will be lost.`
        : `Delete "${fl.label}"?`;
      if (!confirm(msg)) return;
      const idx = floors.findIndex(f => f.id === fl.id);
      floors.splice(idx, 1);
      delete floorData[fl.id];
      if (currentFloor === fl.id) {
        currentFloor = floors[Math.max(0, idx - 1)].id;
        loadFloorData(currentFloor);
      }
      renderFloorTabs();
      scheduleAutoSave();
    });
    tabBar.insertBefore(tab, addBtn);
  });
}

function addFloor() {
  const label = prompt('Floor name:', 'New Floor');
  if (!label || !label.trim()) return;
  const id = 'floor_' + (++floorCounter);
  floors.push({ id, label: label.trim() });
  floorData[id] = { desks: [], notes: [], zoom: 1, panX: 0, panY: 0, deskCounter: 0, noteCounter: 0 };
  switchFloor(id);
  renderFloorTabs();
  scheduleAutoSave();
}

document.getElementById('btn-add-floor').addEventListener('click', addFloor);

// initial render of tabs
renderFloorTabs();

// ─── DOM HELPERS ─────────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const canvasWrap = document.getElementById('canvas-wrap');
const ctxMenu = document.getElementById('ctx-menu');

function updateTransform() {
  canvas.style.transform = `translate(${panX}px,${panY}px) scale(${zoom})`;
}

// ─── TEAMS ───────────────────────────────────────────────────────────────────
function getTeamColor(teamName) {
  if (!teamName) return '#888899';
  if (!teams[teamName]) {
    const usedCount = Object.keys(teams).length;
    teams[teamName] = TEAM_COLORS[usedCount % TEAM_COLORS.length];
  }
  return teams[teamName];
}

function renderTeamDropdown() {
  const sel = document.getElementById('staff-team');
  const current = sel.value;
  sel.innerHTML = '<option value="">— Select team —</option>';
  Object.entries(teams).forEach(([name, color]) => {
    const opt = document.createElement('option');
    opt.value = name;
    opt.textContent = name;
    sel.appendChild(opt);
  });
  if (current && teams[current]) sel.value = current;

  // render team list with delete buttons
  const teamList = document.getElementById('team-list');
  teamList.innerHTML = '';
  if (Object.keys(teams).length === 0) {
    teamList.innerHTML = '<div style="font-size:10px;color:var(--text2);padding:2px 0;">No teams yet — add one above.</div>';
    return;
  }
  Object.entries(teams).forEach(([name, color]) => {
    const row = document.createElement('div');
    row.className = 'team-row';
    const count = staff.filter(s => s.team === name).length;
    row.innerHTML = `
      <div class="team-dot" style="background:${color};"></div>
      <div class="team-name">${name} <span style="color:var(--text2);font-size:10px;">(${count})</span></div>
      <button class="team-delete" title="Delete team">×</button>
    `;
    row.querySelector('.team-delete').addEventListener('click', () => deleteTeam(name));
    teamList.appendChild(row);
  });
}

function deleteTeam(name) {
  const membersCount = staff.filter(s => s.team === name).length;
  const msg = membersCount > 0
    ? `Delete team "${name}"? ${membersCount} person(s) will have their team cleared.`
    : `Delete team "${name}"?`;
  if (!confirm(msg)) return;
  delete teams[name];
  // clear team from staff members
  staff.forEach(s => {
    if (s.team === name) {
      s.team = '';
      s.color = '#888899';
    }
  });
  renderTeamDropdown();
  renderStaffList();
  // re-render chairs so colours update
  desks.forEach(d => d.chairs.forEach(ch => {
    if (ch.staffId) renderChair(d, ch);
  }));
}

// Toggle new team input
document.getElementById('btn-toggle-new-team').addEventListener('click', () => {
  const inp = document.getElementById('staff-new-team');
  const sel = document.getElementById('staff-team');
  const btn = document.getElementById('btn-toggle-new-team');
  if (inp.style.display === 'none') {
    inp.style.display = 'block';
    sel.style.display = 'none';
    btn.textContent = '←';
    inp.focus();
  } else {
    inp.style.display = 'none';
    sel.style.display = 'block';
    btn.textContent = '＋';
  }
});

document.getElementById('staff-new-team').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const val = e.target.value.trim();
    if (val) {
      getTeamColor(val); // registers team
      renderTeamDropdown();
      document.getElementById('staff-team').value = val;
      e.target.value = '';
      e.target.style.display = 'none';
      document.getElementById('staff-team').style.display = 'block';
      document.getElementById('btn-toggle-new-team').textContent = '＋';
    }
  }
});

// ─── STAFF ───────────────────────────────────────────────────────────────────
function addStaff() {
  const name = document.getElementById('staff-name').value.trim();
  const jobTitle = document.getElementById('staff-jobtitle').value.trim();
  const newTeamInp = document.getElementById('staff-new-team');
  const teamSel = document.getElementById('staff-team');

  let teamName = '';
  if (newTeamInp.style.display !== 'none' && newTeamInp.value.trim()) {
    teamName = newTeamInp.value.trim();
  } else {
    teamName = teamSel.value;
  }

  if (!name) return;
  if (teamName) getTeamColor(teamName);
  const color = getTeamColor(teamName);
  const id = 's' + (++staffCounter);
  staff.push({ id, name, jobTitle: jobTitle || '', team: teamName, color, chairId: null });
  document.getElementById('staff-name').value = '';
  document.getElementById('staff-jobtitle').value = '';
  newTeamInp.value = '';
  newTeamInp.style.display = 'none';
  teamSel.style.display = 'block';
  document.getElementById('btn-toggle-new-team').textContent = '＋';
  renderTeamDropdown();
  renderStaffList();
  updateStats();
}

// track which team groups are collapsed
const collapsedTeams = new Set();
let staffSearchQuery = '';

function renderStaffList() {
  const list = document.getElementById('staff-list');
  const query = staffSearchQuery.toLowerCase().trim();
  list.innerHTML = '';

  // filter staff by search
  const filtered = query
    ? staff.filter(s =>
        s.name.toLowerCase().includes(query) ||
        (s.team || '').toLowerCase().includes(query) ||
        (s.jobTitle || '').toLowerCase().includes(query)
      )
    : staff;

  // group by team
  const groups = {};
  filtered.forEach(s => {
    const key = s.team || '— No Team —';
    if (!groups[key]) groups[key] = [];
    groups[key].push(s);
  });

  // sort group keys: named teams first (alphabetical), then no-team
  const sortedKeys = Object.keys(groups).sort((a, b) => {
    if (a === '— No Team —') return 1;
    if (b === '— No Team —') return -1;
    return a.localeCompare(b);
  });

  if (filtered.length === 0) {
    list.innerHTML = `<div style="padding:12px 8px;font-size:11px;color:var(--text2);">No staff match your search.</div>`;
    return;
  }

  sortedKeys.forEach(teamKey => {
    const members = groups[teamKey];
    const color = teams[teamKey] || '#888899';
    const isCollapsed = collapsedTeams.has(teamKey) && !query; // always expand when searching

    const groupEl = document.createElement('div');
    groupEl.className = 'team-group' + (isCollapsed ? ' collapsed' : '');

    const seatedCount = members.filter(s => s.chairId).length;
    groupEl.innerHTML = `
      <div class="team-group-header">
        <div class="team-group-dot" style="background:${color}"></div>
        <div class="team-group-name">${teamKey}</div>
        <div class="team-group-count">${seatedCount}/${members.length}</div>
        <div class="team-group-chevron">▼</div>
      </div>
      <div class="team-group-members"></div>
    `;

    // toggle collapse on header click
    groupEl.querySelector('.team-group-header').addEventListener('click', () => {
      if (collapsedTeams.has(teamKey)) {
        collapsedTeams.delete(teamKey);
        groupEl.classList.remove('collapsed');
      } else {
        collapsedTeams.add(teamKey);
        groupEl.classList.add('collapsed');
      }
    });

    const membersEl = groupEl.querySelector('.team-group-members');
    members.forEach(s => {
      const el = document.createElement('div');
      el.className = 'staff-card' + (s.chairId ? ' seated' : '');
      el.draggable = true;
      el.dataset.id = s.id;
      el.innerHTML = `
        <div class="staff-avatar" style="background:${s.color}">${initials(s.name)}</div>
        <div class="staff-info">
          <div class="staff-name">${s.name}</div>
          <div class="staff-role">${s.jobTitle || s.team || '—'}</div>
        </div>
        <div class="staff-seat-badge ${s.chairId ? '' : 'unseat'}"></div>
      `;
      el.addEventListener('dragstart', e => {
        dragStaffId = s.id;
        el.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
      });
      el.addEventListener('dragend', () => {
        dragStaffId = null;
        el.classList.remove('dragging');
        document.querySelectorAll('.chair.drag-target').forEach(c => c.classList.remove('drag-target'));
      });
      membersEl.appendChild(el);
    });

    list.appendChild(groupEl);
  });
}

function initials(name) {
  return name.split(' ').slice(0,2).map(w => w[0]).join('').toUpperCase();
}

// ─── DESKS ───────────────────────────────────────────────────────────────────
function addDesk() {
  const id = 'd' + (++deskCounter);
  const wrap = canvasWrap.getBoundingClientRect();
  const x = (wrap.width/2 - panX) / zoom - 90;
  const y = (wrap.height/2 - panY) / zoom - 40;
  desks.push({ id, x, y, w: 160, h: 56, chairs: [], label: 'Bank ' + deskCounter, rotation: 0, fontSize: 12, labelRotation: 0 });
  renderDesk(desks[desks.length-1]);
  selectDesk(id);
  updateStats();
}

function renderDesk(desk) {
  let el = document.getElementById(desk.id);
  if (!el) {
    el = document.createElement('div');
    el.className = 'desk';
    el.id = desk.id;
    canvas.appendChild(el);
    makeDeskDraggable(el, desk);
    el.addEventListener('click', e => {
      if (e.target.classList.contains('chair') || e.target.closest('.chair')) return;
      if (e.target.classList.contains('desk-delete')) return;
      if (e.target.classList.contains('desk-font-handle')) return;
      selectDesk(desk.id);
    });
    el.addEventListener('dragover', e => {
      if (dragStaffId) { e.preventDefault(); el.classList.add('drag-over'); }
    });
    el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
    el.addEventListener('drop', e => {
      el.classList.remove('drag-over');
      // dropped on desk but not a chair — ignore
    });
  }
  el.style.left = desk.x + 'px';
  el.style.top = desk.y + 'px';
  el.style.width = desk.w + 'px';
  el.style.height = desk.h + 'px';
  el.style.transform = `rotate(${desk.rotation || 0}deg)`;
  el.innerHTML = `
    <div class="desk-label" title="Double-click to rename" style="font-size:${desk.fontSize || 12}px;transform:rotate(${desk.labelRotation || 0}deg);transform-origin:center center;">${desk.label}</div>
    <button class="desk-delete" title="Delete bank">×</button>
    <div class="desk-font-handle" title="Drag up/down to resize label text"></div>
  `;
  el.querySelector('.desk-delete').addEventListener('click', e => {
    e.stopPropagation();
    deleteDesk(desk.id);
  });

  // Font size drag handle
  const fontHandle = el.querySelector('.desk-font-handle');
  fontHandle.addEventListener('mousedown', e => {
    e.stopPropagation();
    e.preventDefault();
    const startY = e.clientY;
    const startSize = desk.fontSize || 12;
    const onMove = ev => {
      const delta = Math.round((startY - ev.clientY) / 4);
      desk.fontSize = Math.max(8, Math.min(64, startSize + delta));
      const lbl = el.querySelector('.desk-label');
      if (lbl) lbl.style.fontSize = desk.fontSize + 'px';
    };
    const onUp = () => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
  // Double-click label to rename
  el.querySelector('.desk-label').addEventListener('dblclick', e => {
    e.stopPropagation();
    const labelEl = el.querySelector('.desk-label');
    const input = document.createElement('input');
    input.className = 'desk-label-input';
    input.value = desk.label;
    el.replaceChild(input, labelEl);
    input.focus();
    input.select();
    const finish = () => {
      const val = input.value.trim();
      desk.label = val || desk.label;
      renderDesk(desk);
    };
    input.addEventListener('blur', finish);
    input.addEventListener('keydown', ev => {
      if (ev.key === 'Enter') { ev.preventDefault(); input.blur(); }
      if (ev.key === 'Escape') { input.value = desk.label; input.blur(); }
      ev.stopPropagation();
    });
    input.addEventListener('mousedown', ev => ev.stopPropagation());
  });
  // render chairs
  desk.chairs.forEach(ch => renderChair(desk, ch));
  if (desk.id === selectedDeskId) el.classList.add('selected');
}

function makeDeskDraggable(el, desk) {
  let startX, startY, startDX, startDY;
  el.addEventListener('mousedown', e => {
    if (e.target.classList.contains('chair') || e.target.closest('.chair')) return;
    if (e.target.classList.contains('desk-delete')) return;
    if (e.target.classList.contains('desk-font-handle')) return;
    if (e.button !== 0) return;
    isDraggingDesk = true;
    startX = e.clientX;
    startY = e.clientY;
    startDX = desk.x;
    startDY = desk.y;
    e.stopPropagation();

    const onMove = (ev) => {
      desk.x = startDX + (ev.clientX - startX) / zoom;
      desk.y = startDY + (ev.clientY - startY) / zoom;
      el.style.left = desk.x + 'px';
      el.style.top = desk.y + 'px';
    };
    const onUp = () => {
      isDraggingDesk = false;
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

function selectDesk(id) {
  document.querySelectorAll('.desk').forEach(el => el.classList.remove('selected'));
  selectedDeskId = id;
  if (id) document.getElementById(id)?.classList.add('selected');
}

function deleteDesk(id) {
  const desk = desks.find(d => d.id === id);
  if (!desk) return;
  // unseat staff
  desk.chairs.forEach(ch => {
    if (ch.staffId) {
      const s = staff.find(x => x.id === ch.staffId);
      if (s) s.chairId = null;
    }
  });
  desks = desks.filter(d => d.id !== id);
  document.getElementById(id)?.remove();
  if (selectedDeskId === id) selectedDeskId = null;
  renderStaffList();
  updateStats();
}

// ─── CHAIRS ──────────────────────────────────────────────────────────────────
function addChairToSelected(side) {
  if (!selectedDeskId) { alert('Select a bank first.'); return; }
  const desk = desks.find(d => d.id === selectedDeskId);
  if (!desk) return;
  const chId = 'c' + (++chairCounter);
  const CHAIR_SIZE = 77;
  const GAP = 10;

  // count existing chairs on this side to offset
  const sideChairs = desk.chairs.filter(c => c.side === side);
  const idx = sideChairs.length;

  let cx, cy;
  if (side === 'top' || side === 'bottom') {
    cx = 20 + idx * (CHAIR_SIZE + GAP);
    cy = side === 'top' ? -(CHAIR_SIZE + GAP) : desk.h + GAP;
    // expand desk width if needed
    const needed = cx + CHAIR_SIZE + 20;
    if (needed > desk.w) { desk.w = needed; }
  } else {
    cy = 20 + idx * (CHAIR_SIZE + GAP);
    cx = side === 'left' ? -(CHAIR_SIZE + GAP) : desk.w + GAP;
    // expand desk height if needed
    const needed = cy + CHAIR_SIZE + 20;
    if (needed > desk.h) { desk.h = needed; }
  }

  desk.chairs.push({ id: chId, side, cx, cy, staffId: null });
  renderDesk(desk);
  updateStats();
}

function renderChair(desk, ch) {
  const deskEl = document.getElementById(desk.id);
  if (!deskEl) return;
  let el = document.getElementById(ch.id);
  if (!el) {
    el = document.createElement('div');
    el.className = 'chair';
    el.id = ch.id;
    deskEl.appendChild(el);

    // drag-over for dropping staff
    el.addEventListener('dragover', e => {
      if (dragStaffId) { e.preventDefault(); el.classList.add('drag-target'); }
    });
    el.addEventListener('dragleave', () => el.classList.remove('drag-target'));
    el.addEventListener('drop', e => {
      e.stopPropagation();
      el.classList.remove('drag-target');
      if (!dragStaffId) return;
      seatStaff(dragStaffId, desk.id, ch.id);
    });

    // right-click context menu
    el.addEventListener('contextmenu', e => {
      e.preventDefault();
      e.stopPropagation();
      showCtxMenu(e.clientX, e.clientY, desk.id, ch.id);
    });

    // click to unseat
    el.addEventListener('click', e => {
      e.stopPropagation();
      if (ch.staffId) showCtxMenu(e.clientX, e.clientY, desk.id, ch.id);
    });
  }

  el.style.left = ch.cx + 'px';
  el.style.top = ch.cy + 'px';

  const occupant = ch.staffId ? staff.find(s => s.id === ch.staffId) : null;

  // delete btn (visible when desk is selected)
  const delBtn = `<button class="chair-delete" title="Delete chair">×</button>`;

  if (occupant) {
    el.className = 'chair occupied';
    el.id = ch.id;
    el.innerHTML = `
      ${delBtn}
      <div class="chair-avatar" style="background:${occupant.color}">${initials(occupant.name)}</div>
      <div class="chair-name">${occupant.name.split(' ')[0]}</div>
    `;
  } else {
    el.className = 'chair';
    el.id = ch.id;
    el.innerHTML = `
      ${delBtn}
      <div class="chair-icon">🪑</div>
    `;
  }

  el.querySelector('.chair-delete').addEventListener('click', ev => {
    ev.stopPropagation();
    deleteChair(desk.id, ch.id);
  });

  // re-attach drag/drop/click since innerHTML replaced them
  el.addEventListener('dragover', e => {
    if (dragStaffId) { e.preventDefault(); el.classList.add('drag-target'); }
  });
  el.addEventListener('dragleave', () => el.classList.remove('drag-target'));
  el.addEventListener('drop', e => {
    e.stopPropagation();
    el.classList.remove('drag-target');
    if (!dragStaffId) return;
    seatStaff(dragStaffId, desk.id, ch.id);
  });
  el.addEventListener('contextmenu', e => {
    e.preventDefault(); e.stopPropagation();
    showCtxMenu(e.clientX, e.clientY, desk.id, ch.id);
  });
  el.addEventListener('click', e => {
    e.stopPropagation();
    if (ch.staffId) showCtxMenu(e.clientX, e.clientY, desk.id, ch.id);
  });
}

function deleteChair(deskId, chairId) {
  const desk = desks.find(d => d.id === deskId);
  if (!desk) return;
  const ch = desk.chairs.find(c => c.id === chairId);
  if (ch?.staffId) {
    const s = staff.find(x => x.id === ch.staffId);
    if (s) s.chairId = null;
  }
  desk.chairs = desk.chairs.filter(c => c.id !== chairId);
  document.getElementById(chairId)?.remove();
  renderStaffList();
  updateStats();
}

// ─── SEATING ─────────────────────────────────────────────────────────────────
function seatStaff(staffId, deskId, chairId) {
  const s = staff.find(x => x.id === staffId);
  const desk = desks.find(d => d.id === deskId);
  const ch = desk?.chairs.find(c => c.id === chairId);
  if (!s || !ch) return;

  // remove from old chair
  if (s.chairId) {
    desks.forEach(d => {
      const oldCh = d.chairs.find(c => c.id === s.chairId);
      if (oldCh) { oldCh.staffId = null; renderChair(d, oldCh); }
    });
  }

  // evict existing occupant
  if (ch.staffId && ch.staffId !== staffId) {
    const old = staff.find(x => x.id === ch.staffId);
    if (old) old.chairId = null;
  }

  ch.staffId = staffId;
  s.chairId = chairId;
  renderChair(desk, ch);
  renderStaffList();
  updateStats();
}

function unseatFromChair(deskId, chairId) {
  const desk = desks.find(d => d.id === deskId);
  const ch = desk?.chairs.find(c => c.id === chairId);
  if (!ch || !ch.staffId) return;
  const s = staff.find(x => x.id === ch.staffId);
  if (s) s.chairId = null;
  ch.staffId = null;
  renderChair(desk, ch);
  renderStaffList();
  updateStats();
}

// ─── CANVAS PAN ──────────────────────────────────────────────────────────────
canvasWrap.addEventListener('mousedown', e => {
  if (e.button !== 1 && e.button !== 0) return;
  if (e.target !== canvasWrap && e.target !== canvas) return;
  if (isDraggingDesk) return;
  if (e.button === 0) selectDesk(null);
  isPanning = true;
  panStart = { x: e.clientX - panX, y: e.clientY - panY };
  canvasWrap.style.cursor = 'grabbing';
});
document.addEventListener('mousemove', e => {
  if (!isPanning) return;
  panX = e.clientX - panStart.x;
  panY = e.clientY - panStart.y;
  updateTransform();
});
document.addEventListener('mouseup', () => {
  isPanning = false;
  canvasWrap.style.cursor = '';
});

canvasWrap.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY < 0 ? 1.1 : 0.9;
  const rect = canvasWrap.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  panX = mx - (mx - panX) * delta;
  panY = my - (my - panY) * delta;
  zoom = Math.min(3, Math.max(0.2, zoom * delta));
  updateTransform();
}, { passive: false });

document.getElementById('zoom-in').onclick = () => { zoom = Math.min(3, zoom * 1.2); updateTransform(); };
document.getElementById('zoom-out').onclick = () => { zoom = Math.max(0.2, zoom * 0.8); updateTransform(); };
document.getElementById('zoom-reset').onclick = () => { zoom = 1; panX = 0; panY = 0; updateTransform(); };

// Ctrl+Z = undo, Ctrl+Y or Ctrl+Shift+Z = redo
document.addEventListener('keydown', e => {
  const tag = document.activeElement?.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) { e.preventDefault(); undo(); }
  if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) { e.preventDefault(); redo(); }
});

let notes = [];
let noteCounter = 0;
let selectedNoteId = null;

function addNote() {
  const id = 'n' + (++noteCounter);
  const wrap = canvasWrap.getBoundingClientRect();
  const x = (wrap.width / 2 - panX) / zoom - 70;
  const y = (wrap.height / 2 - panY) / zoom - 40;
  notes.push({ id, x, y, text: '' });
  renderNote(notes[notes.length - 1]);
  // auto-focus new note for immediate typing
  setTimeout(() => {
    const el = document.getElementById(id);
    if (el) startEditingNote(el, notes[notes.length - 1]);
  }, 50);
}

function renderNote(note) {
  let el = document.getElementById(note.id);
  if (!el) {
    el = document.createElement('div');
    el.className = 'sticky';
    el.id = note.id;
    canvas.appendChild(el);
    makeStickyDraggable(el, note);

    // single click selects
    el.addEventListener('mousedown', e => {
      e.stopPropagation();
      selectNote(note.id);
    });

    // double click to edit
    el.addEventListener('dblclick', e => {
      e.stopPropagation();
      startEditingNote(el, note);
    });
  }

  el.style.left = note.x + 'px';
  el.style.top = note.y + 'px';
  el.innerHTML = `
    <textarea class="sticky-text" placeholder="Type a note…">${note.text}</textarea>
    <button class="sticky-delete" title="Delete note">×</button>
  `;

  el.querySelector('.sticky-delete').addEventListener('click', ev => {
    ev.stopPropagation();
    deleteNote(note.id);
  });

  el.querySelector('.sticky-text').addEventListener('input', ev => {
    note.text = ev.target.value;
  });

  el.querySelector('.sticky-text').addEventListener('mousedown', ev => {
    if (el.classList.contains('editing')) ev.stopPropagation();
  });

  if (note.id === selectedNoteId) el.classList.add('selected');
}

function startEditingNote(el, note) {
  selectNote(note.id);
  el.classList.add('editing');
  el.style.cursor = 'text';
  const ta = el.querySelector('.sticky-text');
  ta.focus();
  ta.setSelectionRange(ta.value.length, ta.value.length);

  const stopEditing = () => {
    el.classList.remove('editing');
    el.style.cursor = 'move';
    note.text = ta.value;
    ta.removeEventListener('blur', stopEditing);
  };
  ta.addEventListener('blur', stopEditing);
}

function selectNote(id) {
  document.querySelectorAll('.sticky').forEach(el => el.classList.remove('selected'));
  selectedNoteId = id;
  if (id) document.getElementById(id)?.classList.add('selected');
  selectDesk(null);
}

function deleteNote(id) {
  notes = notes.filter(n => n.id !== id);
  document.getElementById(id)?.remove();
  if (selectedNoteId === id) selectedNoteId = null;
}

function makeStickyDraggable(el, note) {
  let startX, startY, startNX, startNY, dragging = false;
  el.addEventListener('mousedown', e => {
    if (e.target.classList.contains('sticky-delete')) return;
    if (e.target.classList.contains('sticky-text') && el.classList.contains('editing')) return;
    if (e.button !== 0) return;
    dragging = true;
    startX = e.clientX;
    startY = e.clientY;
    startNX = note.x;
    startNY = note.y;
    e.stopPropagation();

    const onMove = ev => {
      if (!dragging) return;
      note.x = startNX + (ev.clientX - startX) / zoom;
      note.y = startNY + (ev.clientY - startY) / zoom;
      el.style.left = note.x + 'px';
      el.style.top = note.y + 'px';
    };
    const onUp = () => {
      dragging = false;
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

async function saveToCloud() {
  if (isSaving) return;
  isSaving = true;
  saveBtn.textContent = '💾 Saving…';

    });

async function loadFromCloud() {
  setSaveStatus('⏳ Loading…', 'var(--text2)');
  try {
    const res = await fetch(BIN_URL + '/latest', {
      headers: { 'X-Master-Key': API_KEY }
    });
    if (!res.ok) throw new Error(`Load failed: ${res.status}`);
    const json = await res.json();
    const state = json.record;

    // ── restore teams
    if (state.teams && Object.keys(state.teams).length > 0) {
      teams = state.teams;
      renderTeamDropdown();
    }

    // ── restore staff
    if (state.staff && state.staff.length > 0) {
      staff = state.staff;
      staffCounter = staff.reduce((m, s) => Math.max(m, parseInt(s.id.slice(1)) || 0), 0);
      renderStaffList();
    }

    // ── restore floors (new format)
    if (state.floors && state.floors.length > 0) {
      floors = state.floors;
      floorCounter = state.floorCounter || 10;
      // ensure floorData exists for every floor
      floors.forEach(f => {
        if (state.floorData && state.floorData[f.id]) {
          floorData[f.id] = state.floorData[f.id];
          // ensure notes array exists
          if (!floorData[f.id].notes) floorData[f.id].notes = [];
        } else {
          floorData[f.id] = { desks: [], notes: [], zoom: 1, panX: 0, panY: 0, deskCounter: 0, noteCounter: 0 };
        }
      });
    } else {
      // ── legacy format: migrate flat desks/notes to ground floor
      if (state.desks && state.desks.length > 0) {
        floorData['ground'].desks = state.desks;
        floorData['ground'].deskCounter = state.desks.reduce((m, d) => Math.max(m, parseInt(d.id.slice(1)) || 0), 0);
      }
      if (state.notes && state.notes.length > 0) {
        floorData['ground'].notes = state.notes;
        floorData['ground'].noteCounter = state.notes.reduce((m, n) => Math.max(m, parseInt(n.id.slice(1)) || 0), 0);
      }
    }

    // ── switch to saved floor
    const savedFloor = state.currentFloor || 'ground';
    currentFloor = floors.find(f => f.id === savedFloor) ? savedFloor : floors[0].id;
    renderFloorTabs();
    loadFloorData(currentFloor);

    // ── sidebar notes
    if (state.sidebarNotes) {
      const na = document.getElementById('notes-area');
      if (na) na.value = state.sidebarNotes;
    }

    updateStats();
    setSaveStatus('☁️ Synced', 'var(--text2)');
    undoStack.length = 0; redoStack.length = 0;
    snapshot();
    updateUndoButtons();
  } catch(e) {
    console.error('Load error:', e);
    setSaveStatus('⚠️ Could not load saved data', 'var(--accent2)');
    // still render default tabs so app is usable
    renderFloorTabs();
  }
}

// Manual save button
saveBtn.addEventListener('click', saveToCloud);

// Auto-save hooks — patch updateStats to trigger after every action
const _baseUpdateStats = updateStats;
updateStats = function() {
  _baseUpdateStats();
  scheduleAutoSave();
};

// Also auto-save on sidebar notes and sticky note edits
document.getElementById('notes-area').addEventListener('input', scheduleAutoSave);
document.addEventListener('input', e => {
  if (e.target.classList.contains('sticky-text')) scheduleAutoSave();
});

// Load on startup
loadFromCloud();
</script>
</body>
</html>
